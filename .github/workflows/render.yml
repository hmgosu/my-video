name: Render Video

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Render video
        run: npx remotion render src/index.ts HelloWorld out/HelloWorld.mp4

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: HelloWorld
          path: out/HelloWorld.mp4